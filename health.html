<!DOCTYPE html>
<html>

<head>

<title>Health Monitoring System</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#fde4ec,#e0f7fa);
display:flex;
flex-direction:column;
align-items:center;
margin:0;
padding:20px;
}

nav{
margin-bottom:20px;
}

nav a{
margin:0 10px;
text-decoration:none;
font-weight:bold;
color:#ad1457;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
width:420px;
}

h2{
text-align:center;
color:#ad1457;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input, select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff4d6d;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#d62839;
transform:scale(1.05);
}

.result{
margin-top:10px;
font-weight:bold;
}

</style>

</head>


<body>

<nav>

<a href="index.html">Home</a>
<a href="health.html">Health</a>
<a href="safety.html">Travel Safety</a>
<a href="sos.html">SOS</a>
<a href="about.html">About</a>

</nav>


<div class="card">

<h2>Health Monitoring System</h2>


<label>Sleep Hours</label>
<input type="number" id="sleep">


<label>Calories Intake (kcal)</label>
<input type="number" id="calories">


<label>Stress Level</label>
<select id="stress">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>


<label>Body Temperature (°C)</label>
<input type="number" id="temp">


<label>Current Location</label>
<input type="text" id="location" placeholder="Enter area">


<label>Last Menstrual Date</label>
<input type="date" id="periodDate">


<button onclick="analyzeHealth()">Analyze Health</button>

<button onclick="resetCycle()">Reset Period Data</button>


<p class="result" id="healthResult"></p>
<p class="result" id="doctorResult"></p>
<p class="result" id="periodReminder"></p>
<p class="result" id="breastReminder"></p>

</div>


<script>

/* Load saved menstrual data automatically */

window.onload = function(){

let savedDate = localStorage.getItem("periodDate");

if(savedDate){

document.getElementById("periodDate").value = savedDate;
document.getElementById("periodDate").disabled = true;

calculateCycle(savedDate);

}

}


/* Health analysis */

function analyzeHealth(){

let sleep = document.getElementById("sleep").value;
let calories = document.getElementById("calories").value;
let stress = document.getElementById("stress").value;
let temp = document.getElementById("temp").value;

let healthMsg = "";
let doctorMsg = "";


/* Disease detection rules */

if(temp > 38){

healthMsg = "⚠ Possible Fever or Flu detected.";
doctorMsg = "Consult a General Physician.";

}

else if(sleep < 6 && stress === "High"){

healthMsg = "⚠ Lifestyle pattern indicates risk of PCOS / PCOD.";
doctorMsg = "Consult a Gynecologist or Endocrinologist.";

}

else if(calories < 1200){

healthMsg = "⚠ Low calorie intake detected – possible fatigue risk.";
doctorMsg = "Consult a Nutrition Specialist.";

}

else{

healthMsg = "✔ Health parameters appear normal.";
doctorMsg = "Maintain healthy lifestyle habits.";

}

document.getElementById("healthResult").innerHTML = healthMsg;
document.getElementById("doctorResult").innerHTML = doctorMsg;


/* Save menstrual date permanently */

let periodInput = document.getElementById("periodDate").value;

if(periodInput && !localStorage.getItem("periodDate")){

localStorage.setItem("periodDate", periodInput);

document.getElementById("periodDate").disabled = true;

calculateCycle(periodInput);

}

}


/* Calculate menstrual cycle */

function calculateCycle(periodInput){

let period = new Date(periodInput);

let nextPeriod = new Date(period);
nextPeriod.setDate(period.getDate() + 28);

let weekBefore = new Date(nextPeriod);
weekBefore.setDate(nextPeriod.getDate() - 7);

document.getElementById("periodReminder").innerHTML =
"Next expected period: " + nextPeriod.toDateString() +
"<br>Reminder begins: " + weekBefore.toDateString();


/* Breast self examination reminder */

let breastExam = new Date(period);
breastExam.setDate(period.getDate() + 5);

document.getElementById("breastReminder").innerHTML =
"Breast Self Examination Reminder: Around " + breastExam.toDateString();

}


/* Reset stored cycle */

function resetCycle(){

localStorage.removeItem("periodDate");
location.reload();

}

</script>

</body>

</html>
