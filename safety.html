<!DOCTYPE html>
<html>
<head>
    <title>Travel Safety Detection</title>

    <!-- Connect external CSS file -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Travel Safety Detection</h1>

<p>Select your travel location:</p>

<select id="location">
    <option value="">--Select Location--</option>
    <option value="safe">Area A</option>
    <option value="moderate">Area B</option>
    <option value="unsafe">Area C</option>
</select>

<br><br>

<button onclick="checkSafety()">Check Safety</button>

<p id="result"></p>

<script>

function checkSafety(){

    let location = document.getElementById("location").value;
    let result = document.getElementById("result");

    if(location == "safe"){
        result.innerHTML = " Area is SAFE. You can travel normally.";
        result.style.color = "green";
    }

    else if(location == "moderate"){
        result.innerHTML = " Moderate risk area. Stay alert.";
        result.style.color = "orange";
    }

    else if(location == "unsafe"){
        result.innerHTML = " HIGH RISK AREA! Share your location and avoid isolated places.";
        result.style.color = "red";
    }

    else{
        result.innerHTML = "Please select a location.";
        result.style.color = "black";
    }

}

</script>

</body>
</html>
